name: Continuous integration

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify locked foundation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.12.0

      - name: Install pinned pnpm
        run: npm install --global pnpm@11.5.3 --ignore-scripts --no-audit --no-fund

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate, test, and build
        run: npm run check

      - name: Audit dependency advisories
        run: pnpm audit --audit-level low
